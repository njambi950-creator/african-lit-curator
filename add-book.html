<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lugha & Lore | Add Book</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Lugha & Lore</h1>
      <nav>
        <ul>
          <li><a href="index.html">Bookshelf</a></li>
          <li><a href="add-book.html" class="active">Add New Book</a></li>
          <li><a href="spotlight.html">Author Spotlight</a></li>
        </ul>
      </nav>
    </header>
    <main class="form-page-wrapper">
      <section class="form-container">
        <p class="form-title">Fill in to catalog your book:</p>
        <form id="book-form">
          <div class="input-group">
            <label for="title">Book Title:</label>
            <input
              type="text"
              id="title"
              required
              placeholder="e.g. The River Between"
            />
          </div>
          <div class="input-group">
            <label for="author">Author:</label>
            <input
              type="text"
              id="author"
              required
              placeholder="e.g. Ngũgĩ wa Thiong'o"
            />
          </div>

          <div class="input-group">
            <label for="genre">Genre:</label>
            <select id="genre" required>
              <option value="">--Select Genre--</option>
              <option value="Afrofantasy">Afrofantasy</option>
              <option value="Classic">Classic Literature</option>
              <option value="Contemporary">Contemporary Fiction</option>
              <option value="Traditional">Traditional Folklore</option>
            </select>
          </div>
          <div class="input-group">
            <label for="review">Your Reflection:</label>
            <textarea
              id="review"
              rows="4"
              placeholder="What did this story teach you?"
            ></textarea>
          </div>
          <div class="input-group">
            <label for="coverUrl">Book Cover Image URL:</label>
            <input
              type="text"
              id="coverUrl"
              placeholder="Paste image link here"
            />
          </div>

          <button type="submit" id="save-btn">Save to Library</button>
        </form>
        <div id="message-area"></div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
